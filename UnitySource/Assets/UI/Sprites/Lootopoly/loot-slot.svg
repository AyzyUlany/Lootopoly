<?xml version="1.0" encoding="UTF-8"?>
<!-- Lootopoly UI | loot-slot.svg — Unity UI Toolkit compatible     -->
<!-- Usage: background-image on equip slots and shop item cards     -->
<svg xmlns="http://www.w3.org/2000/svg" width="160" height="52" viewBox="0 0 160 52">
  <defs>
    <linearGradient id="slot-bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#1e1810" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#141008" stop-opacity="0.9"/>
    </linearGradient>
  </defs>
  <rect width="160" height="52" rx="7" fill="url(#slot-bg)"/>
  <rect width="160" height="52" rx="7" fill="none"
        stroke="#c9922a" stroke-width="1" stroke-opacity="0.35"/>
  <!-- Left icon area -->
  <rect x="4" y="4" width="44" height="44" rx="5" fill="#0e0c06"/>
  <rect x="4" y="4" width="44" height="44" rx="5" fill="none"
        stroke="#c9922a" stroke-width="0.75" stroke-opacity="0.28"/>
  <!-- Text area divider -->
  <line x1="52" y1="8" x2="52" y2="44" stroke="#c9922a" stroke-width="0.5" stroke-opacity="0.2"/>
</svg>

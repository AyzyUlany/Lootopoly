<?xml version="1.0" encoding="UTF-8"?>
<!-- Lootopoly UI | btn-craft.svg — Unity UI Toolkit compatible     -->
<!-- Usage: background-image on .btn-craft (Craft Legendary)        -->
<svg xmlns="http://www.w3.org/2000/svg" width="320" height="52" viewBox="0 0 320 52">
  <defs>
    <linearGradient id="craft-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#3a1858"/>
      <stop offset="50%"  stop-color="#6030a0"/>
      <stop offset="100%" stop-color="#3a1858"/>
    </linearGradient>
    <linearGradient id="craft-sheen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.10"/>
    </linearGradient>
  </defs>
  <rect width="320" height="48" rx="8" fill="url(#craft-bg)"/>
  <rect width="320" height="48" rx="8" fill="url(#craft-sheen)"/>
  <line x1="12" y1="1" x2="308" y2="1" stroke="#ffffff" stroke-width="1" stroke-opacity="0.18"/>
  <rect width="320" height="48" rx="8" fill="none"
        stroke="#c080ff" stroke-width="1.5" stroke-opacity="0.65"/>
  <rect x="3" y="48" width="314" height="4" rx="2" fill="#180830" fill-opacity="0.65"/>
</svg>

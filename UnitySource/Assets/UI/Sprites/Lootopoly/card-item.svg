<?xml version="1.0" encoding="UTF-8"?>
<!-- Lootopoly UI | card-item.svg — Unity UI Toolkit compatible     -->
<!-- Usage: background-image on card elements in .CardContainer     -->
<svg xmlns="http://www.w3.org/2000/svg" width="100" height="148" viewBox="0 0 100 148">
  <defs>
    <linearGradient id="card-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#241c0c"/>
      <stop offset="100%" stop-color="#100c06"/>
    </linearGradient>
    <linearGradient id="card-top" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#c9922a" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#e8b84b" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#c9922a" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="card-art-overlay" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.55"/>
    </linearGradient>
  </defs>
  <!-- Card body -->
  <rect width="100" height="148" rx="10" fill="url(#card-bg)"/>
  <!-- Border -->
  <rect width="100" height="148" rx="10" fill="none"
        stroke="#8c640c" stroke-width="2" stroke-opacity="0.8"/>
  <!-- Inner border -->
  <rect x="4" y="4" width="92" height="140" rx="7" fill="none"
        stroke="#e8b84b" stroke-width="0.75" stroke-opacity="0.18"/>
  <!-- Top shimmer -->
  <line x1="12" y1="1" x2="88" y2="1" stroke="url(#card-top)" stroke-width="1.5"/>
  <!-- Art area -->
  <rect x="8" y="8" width="84" height="72" rx="6" fill="#0a0806"/>
  <rect x="8" y="8" width="84" height="72" rx="6" fill="none"
        stroke="#c9922a" stroke-width="1" stroke-opacity="0.3"/>
  <rect x="8" y="8" width="84" height="72" rx="6" fill="url(#card-art-overlay)"/>
  <!-- Name bar -->
  <rect x="8" y="86" width="84" height="18" rx="3" fill="#1a1208" fill-opacity="0.8"/>
  <!-- Description area -->
  <rect x="8" y="110" width="84" height="30" rx="3" fill="#0e0c06" fill-opacity="0.6"/>
  <!-- Corner pip ticks -->
  <path d="M 10,4 L 10,9 M 4,10 L 9,10"   stroke="#c9922a" stroke-width="1" stroke-opacity="0.7"/>
  <path d="M 90,4 L 90,9 M 96,10 L 91,10"  stroke="#c9922a" stroke-width="1" stroke-opacity="0.7"/>
</svg>

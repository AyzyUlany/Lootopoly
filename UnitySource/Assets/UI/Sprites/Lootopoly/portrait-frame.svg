<?xml version="1.0" encoding="UTF-8"?>
<!-- Lootopoly UI | portrait-frame.svg — Unity UI Toolkit compatible -->
<!-- Usage: background-image on .portrait-frame                      -->
<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="portrait-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#2a1c0c"/>
      <stop offset="100%" stop-color="#1a1008"/>
    </linearGradient>
    <radialGradient id="portrait-vignette" cx="50%" cy="50%" r="60%">
      <stop offset="0%"   stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.4"/>
    </radialGradient>
  </defs>
  <rect width="64" height="64" rx="8" fill="url(#portrait-bg)"/>
  <rect width="64" height="64" rx="8" fill="url(#portrait-vignette)"/>
  <!-- Border -->
  <rect width="64" height="64" rx="8" fill="none"
        stroke="#8c640c" stroke-width="2" stroke-opacity="0.9"/>
  <!-- Inner border glow -->
  <rect x="2.5" y="2.5" width="59" height="59" rx="6.5" fill="none"
        stroke="#e8b84b" stroke-width="0.75" stroke-opacity="0.25"/>
  <!-- Corner accents -->
  <path d="M 8,2 L 8,6 M 2,8 L 6,8"   stroke="#c9922a" stroke-width="1.5" stroke-opacity="0.8"/>
  <path d="M 56,2 L 56,6 M 62,8 L 58,8" stroke="#c9922a" stroke-width="1.5" stroke-opacity="0.8"/>
  <path d="M 8,62 L 8,58 M 2,56 L 6,56"  stroke="#c9922a" stroke-width="1.5" stroke-opacity="0.8"/>
  <path d="M 56,62 L 56,58 M 62,56 L 58,56" stroke="#c9922a" stroke-width="1.5" stroke-opacity="0.8"/>
</svg>

<?xml version="1.0" encoding="UTF-8"?>
<!-- Lootopoly UI | room-card.svg — Unity UI Toolkit compatible     -->
<!-- Usage: background-image on .room-card                          -->
<svg xmlns="http://www.w3.org/2000/svg" width="480" height="52" viewBox="0 0 480 52">
  <defs>
    <linearGradient id="room-card-bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#1e1608" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#141008" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="room-left-accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#c9922a" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#c9922a" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="480" height="52" rx="7" fill="url(#room-card-bg)"/>
  <rect width="480" height="52" rx="7" fill="none"
        stroke="#ffffff" stroke-width="1" stroke-opacity="0.07"/>
  <!-- Left gold accent bar -->
  <rect width="3" height="52" rx="1.5" fill="url(#room-left-accent)"/>
</svg>
